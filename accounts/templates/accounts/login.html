{% extends 'main/base.html' %}



{% block title %}

Вход

{% endblock %}




{% block content %}




<div class="row justify-content-center">


<div class="col-md-5">



<div class="card p-4">



<h2 class="text-center mb-4">

Вход

</h2>






<form method="post">


{% csrf_token %}




<div class="mb-3">


<label class="form-label">

Имя пользователя

</label>


<input 
type="text"
name="username"
class="form-control"
placeholder="Введите имя"
>


</div>






<div class="mb-3">


<label class="form-label">

Пароль

</label>


<input 
type="password"
name="password"
class="form-control"
placeholder="Введите пароль"
>


</div>





{% if error %}


<div class="alert alert-danger">

Неверный логин или пароль

</div>


{% endif %}





<button class="btn btn-dark w-100">

Войти

</button>



</form>








<div class="text-center mt-4">


Нет аккаунта?


<a href="{% url 'register' %}">

Создать

</a>



</div>





</div>


</div>


</div>




{% endblock %}
