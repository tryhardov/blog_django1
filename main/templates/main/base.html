{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}BLOCKS{% endblock %}
    </title>
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">
    <style>
        body {
            background: #f4f4f4;
            color: #111;
        }
        .navbar {
            background: #000;
        }
        .navbar-brand {
            letter-spacing: 4px;
            font-weight: 700;
        }
        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,.08);
            transition: .25s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            max-height: 300px;
            object-fit: cover;
        }
        footer {
            background: #000;
            color: white;
            margin-top: 80px;
            padding: 40px 0;
        }
        .search {
            border-radius: 30px;
        }
        .btn-dark {
            border-radius: 30px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand" href="/">
            BLOCKS
        </a>

        <button 
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Все посты
                    </a>
                </li>
                {% for category in categories %}
                    <li class="nav-item">
                        <a 
                            class="nav-link"
                            href="{% url 'block_list_by_category' category.slug %}">

                            {{ category.name }}

                        </a>
                    </li>
                {% endfor %}
            </ul>

            <form 
                action="{% url 'user_search' %}"
                method="get"
                class="d-flex">
                <input
                    name="q"
                    class="form-control search me-2"
                    placeholder="Автор">

                <button class="btn btn-outline-light">
                    <i class="bi bi-search"></i>
                </button>
            </form>
        </div>
    </div>
</nav>
<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>

<footer>
    <div class="container">
        <h4>
            BLOCKS
        </h4>

        <p>
            Минималистичный блог
        </p>
    </div>
</footer>
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
</script>

</body>

</html>
